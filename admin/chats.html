<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="chat.js?v=2"></script>
<script>
var NAMES={telman:"Тельман",anastasia:"Анастасия"};
var FCM_CFG={apiKey:"AIzaSyD3XHJ3xdeJC_ALeIK4nOf1EASO39W3Gh0",authDomain:"mmstudio-86917.firebaseapp.com",databaseURL:"https://mmstudio-86917-default-rtdb.europe-west1.firebasedatabase.app",projectId:"mmstudio-86917",storageBucket:"mmstudio-86917.firebasestorage.app",messagingSenderId:"466384625481",appId:"1:466384625481:web:fb4bb7144d0d329be8c498"};
function getMyId(){return(localStorage.getItem("admin_user")||"").toLowerCase();}
function loadChatList(){
  var myId=getMyId();if(!myId)return;
  try{if(!firebase.apps.length)firebase.initializeApp(FCM_CFG);}catch(e){}
  var db=firebase.database();
  var container=document.getElementById("chatList");
  var users=Object.keys(NAMES).filter(function(u){return u!==myId;});
  var html='<div style="padding:4px 0">';
  for(var i=0;i<users.length;i++){
    var uid=users[i];
    var name=NAMES[uid];
    var initial=name.charAt(0);
    html+='<div class="chat-list-item" onclick="window.location.href=\'chat.html\'">';
    html+='<div class="chat-list-avatar">'+initial+'</div>';
    html+='<div class="chat-list-info"><div class="chat-list-name"><span id="cl-dot-'+uid+'" class="online-dot offline-dot"></span>'+name+'</div><div class="chat-list-last" id="cl-last-'+uid+'">Нет сообщений</div></div>';
    html+='<div class="chat-list-time" id="cl-time-'+uid+'"></div>';
    html+='</div>';
  }
  html+='</div>';
  container.innerHTML=html;
  for(var j=0;j<users.length;j++){
    (function(uid){
      db.ref("presence/"+uid).on("value",function(snap){
        var v=snap.val();
        var dot=document.getElementById("cl-dot-"+uid);
        if(dot)dot.className="online-dot "+(v&&v.online?"online-dot":"offline-dot");
      });
      db.ref("messages").orderByChild("time").limitToLast(1).on("value",function(snap){
        var last=null;
        snap.forEach(function(ch){var m=ch.val();if(m.user===uid||m.user===myId)last=m;});
        if(last){
          var lt=document.getElementById("cl-time-"+uid);
          var ll=document.getElementById("cl-last-"+uid);
          if(lt)lt.textContent=new Date(last.time).toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
          if(ll)ll.textContent=(last.user===myId?"Вы: ":"")+((last.text||"Фото").substring(0,50));
        }
      });
    })(users[j]);
  }
}
if(localStorage.getItem("admin_auth")==="1")loadChatList();
</script>
