<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover,interactive-widget=resizes-content">
<title>Чат | MM Studio</title>
<link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Unbounded:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script>
var c="";
if(localStorage.getItem("admin_auth")==="1")c="auth-ok";
if(localStorage.getItem("mm_theme")==="dark"||(c&&!localStorage.getItem("mm_theme")&&window.matchMedia&&window.matchMedia("(prefers-color-scheme:dark)").matches))c+=" dark";
if(c)document.documentElement.className=c;
</script>
<style>
.auth-ok #loginScreen{display:none!important}.auth-ok #chatApp{display:flex!important}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px;width:100%;max-width:320px;text-align:center}
.login-box h1{font-family:"Unbounded",sans-serif;font-size:1.1rem;margin-bottom:6px}
.login-box p{color:var(--muted);font-size:0.8rem;margin-bottom:20px}
.login-box input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:8px;font-size:1rem;font-family:inherit;margin-bottom:8px;outline:none;background:var(--bg);color:var(--text)}
.login-box input:focus{border-color:var(--text)}
.login-box button{width:100%;padding:12px;background:var(--text);color:var(--bg);border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;font-family:inherit}
.login-box button:hover{opacity:.85}
.login-error{color:#c00;font-size:0.8rem;margin-top:6px;display:none}
#chatApp{display:none;height:100vh;height:100dvh;flex-direction:column;background:var(--bg)}
.chat-topbar{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.chat-topbar .back-btn{background:none;border:none;font-size:1.2rem;cursor:pointer;padding:8px;color:var(--text);border-radius:6px}
.chat-topbar .back-btn:active{background:var(--hover)}
.chat-topbar-title{flex:1;font-family:"Unbounded",sans-serif;font-size:0.85rem}
.chat-topbar-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:6px;-webkit-overflow-scrolling:touch}
.chat-date-sep{text-align:center;font-size:0.68rem;color:var(--muted);padding:8px 0;position:relative}
.chat-date-sep::before,.chat-date-sep::after{content:"";position:absolute;top:50%;width:calc(50% - 35px);height:1px;background:var(--border)}
.chat-date-sep::before{left:0}
.chat-date-sep::after{right:0}
.chat-msg{max-width:75%;padding:8px 12px;border-radius:12px;font-size:0.84rem;line-height:1.4;position:relative;word-break:break-word;cursor:default}
.chat-me{align-self:flex-end;background:var(--text);color:var(--bg);border-bottom-right-radius:3px}
.chat-other{align-self:flex-start;background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:3px}
.chat-msg-name{font-size:0.62rem;font-weight:700;margin-bottom:2px;opacity:.6}
.chat-msg-img{max-width:260px;max-height:260px;border-radius:8px;margin:4px 0;cursor:pointer;display:block}
.chat-msg-img:hover{opacity:.9}
.chat-msg-text{white-space:pre-wrap}
.chat-msg-footer{display:flex;align-items:center;justify-content:flex-end;gap:5px;margin-top:3px}
.chat-msg-time{font-size:0.58rem;opacity:.45}
.msg-check{font-size:0.62rem;line-height:1;opacity:.45}
.msg-check.msg-read{opacity:.75}
.msg-edited{font-size:0.56rem;opacity:.45;font-style:italic}
.chat-input-bar{display:flex;align-items:flex-end;gap:8px;padding:10px 16px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;padding-bottom:max(10px,env(safe-area-inset-bottom,10px));position:sticky;bottom:0;z-index:10}
.chat-attach{background:none;border:none;font-size:1.3rem;cursor:pointer;padding:8px;color:var(--muted);border-radius:8px;flex-shrink:0;line-height:1}
.chat-attach:active{background:var(--hover)}
.chat-input-wrap{flex:1;display:flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:4px 4px 4px 14px}
.chat-input-wrap textarea{flex:1;border:none;background:transparent;font-size:0.88rem;font-family:inherit;outline:none;resize:none;max-height:120px;padding:6px 0;color:var(--text);line-height:1.4;min-height:20px}
.chat-send{background:var(--text);color:var(--bg);border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;font-size:1rem;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.chat-send:active{opacity:.8}
.chat-send:disabled{opacity:.3;cursor:default}
.chat-preview{position:relative;display:inline-block;margin:4px 0}
.chat-preview img{max-width:200px;max-height:160px;border-radius:8px;border:1px solid var(--border)}
.chat-preview-remove{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:0.7rem;display:flex;align-items:center;justify-content:center}
.chat-empty{text-align:center;color:var(--muted);font-size:0.85rem;padding:40px 20px}
#chatFileInput{display:none}
.edit-bar{display:flex;align-items:center;gap:6px;padding:6px 16px;background:var(--hover);border-top:1px solid var(--border);font-size:0.78rem;color:var(--text)}
.edit-bar span{flex:1;color:var(--muted)}
.edit-bar button{background:none;border:none;cursor:pointer;font-size:0.85rem;padding:4px 8px;color:var(--muted);border-radius:4px}
.edit-bar button:active{background:var(--border)}
.edit-bar .edit-cancel{color:#c00}
@media(min-width:769px){
  .chat-messages{padding:24px 32px;max-width:800px;margin:0 auto;width:100%}
  .chat-input-bar{padding:12px 32px;max-width:800px;margin:0 auto;width:100%}
  .chat-msg{max-width:55%}
}
@media(max-width:768px){
  .chat-attach{font-size:1.5rem;padding:10px}
  .chat-send{width:40px;height:40px;font-size:1.1rem}
  .chat-input-wrap{padding:6px 6px 6px 12px}
  .chat-msg{max-width:88%}
}
</style>
</head><body>
<div class="login-screen" id="loginScreen">
<div class="login-box"><h1>MM Studio</h1><p>Чат</p>
<input type="text" id="usernameInput" placeholder="Логин" autofocus>
<input type="password" id="passwordInput" placeholder="Пароль">
<button onclick="doLogin()">Войти</button>
<div class="login-error" id="loginError">Неверный логин или пароль</div>
</div></div>

<div id="chatApp">
  <div class="chat-topbar">
    <button class="back-btn" onclick="window.location.href='index.html'" title="Назад">&#8592;</button>
    <div class="chat-topbar-title">Чат</div>
    <div class="chat-topbar-dot" id="chatDot"></div>
  </div>
  <div class="chat-messages" id="chatMessages"><div class="chat-empty">Загрузка...</div></div>
  <div class="edit-bar" id="editBar" style="display:none">
    <span>Редактирование</span>
    <button class="edit-cancel" onclick="cancelEdit()">&#10005;</button>
  </div>
  <div class="chat-input-bar">
    <label class="chat-attach" title="Прикрепить фото">&#128247;<input type="file" id="chatFileInput" accept="image/*"></label>
    <div class="chat-input-wrap">
      <textarea id="chatInput" rows="1" placeholder="Сообщение..." maxlength="2000"></textarea>
      <button class="chat-send" id="chatSendBtn" disabled>&#10148;</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
var USERS={"Telman":"Kn0pKa78","Anastasia":"mm2026"};
var NAMES={telman:"Тельман",anastasia:"Анастасия"};
var CFG={apiKey:"AIzaSyD3XHJ3xdeJC_ALeIK4nOf1EASO39W3Gh0",authDomain:"mmstudio-86917.firebaseapp.com",databaseURL:"https://mmstudio-86917-default-rtdb.europe-west1.firebasedatabase.app",projectId:"mmstudio-86917",storageBucket:"mmstudio-86917.firebasestorage.app",messagingSenderId:"466384625481",appId:"1:466384625481:web:fb4bb7144d0d329be8c498"};
var db,myId,myName,previewData=null,editingMsgId=null;

function doLogin(){
  var u=document.getElementById("usernameInput").value;
  var p=document.getElementById("passwordInput").value;
  if(USERS[u]&&USERS[u]===p){
    document.getElementById("loginScreen").style.display="none";
    document.getElementById("chatApp").style.display="flex";
    localStorage.setItem("admin_auth","1");
    localStorage.setItem("admin_user",u);
    myId=u.toLowerCase();myName=NAMES[myId]||u;
    initChat();
  }else document.getElementById("loginError").style.display="block";
}

function initChat(){
  try{if(!firebase.apps.length)firebase.initializeApp(CFG);db=firebase.database();}catch(e){return;}
  setupPresence();
  loadMessages();
  setupInput();
}

function setupPresence(){
  db.ref(".info/connected").on("value",function(snap){
    if(snap.val()===true){
      db.ref("presence/"+myId).set({online:true,ts:Date.now()});
      db.ref("presence/"+myId).onDisconnect().set({online:false,ts:Date.now()});
    }
  });
  var otherId=myId==="telman"?"anastasia":"telman";
  db.ref("presence/"+otherId).on("value",function(snap){
    var v=snap.val();
    var dot=document.getElementById("chatDot");
    dot.className="chat-topbar-dot "+(v&&v.online?"online-dot":"offline-dot");
  });
}

function loadMessages(){
  db.ref("messages").orderByChild("time").on("value",function(snap){
    var container=document.getElementById("chatMessages");
    var msgs=[];
    snap.forEach(function(ch){msgs.push(Object.assign({id:ch.key},ch.val()));});
    if(!msgs.length){
      container.innerHTML='<div class="chat-empty">Нет сообщений</div>';
      return;
    }
    var html="";
    var lastDate="";
    for(var i=0;i<msgs.length;i++){
      var m=msgs[i];
      var d=new Date(m.time);
      var dateStr=d.toLocaleDateString("ru-RU",{day:"numeric",month:"long",year:"numeric"});
      if(dateStr!==lastDate){
        html+='<div class="chat-date-sep">'+dateStr+'</div>';
        lastDate=dateStr;
      }
      var isMe=m.user===myId;
      var cls=isMe?"chat-msg chat-me":"chat-msg chat-other";
      var editedTag=m.edited?' <span class="msg-edited">(ред.)</span>':"";
      var checkHtml="";
      if(isMe){
        checkHtml=m.read?'<span class="msg-check msg-read">&#10003;&#10003;</span>':'<span class="msg-check">&#10003;</span>';
      }
      var imgHtml="";
      if(m.image) imgHtml='<img class="chat-msg-img" src="'+esc(m.image)+'" onclick="window.open(this.src)" loading="lazy">';
      html+='<div class="'+cls+'" data-msg-id="'+m.id+'" data-user="'+m.user+'" oncontextmenu="onMsgContext(event,\''+m.id+'\',\''+m.user+'\')">';
      if(!isMe) html+='<div class="chat-msg-name">'+esc(m.name)+'</div>';
      if(imgHtml) html+=imgHtml;
      html+='<div class="chat-msg-body">';
      if(m.text) html+='<div class="chat-msg-text">'+esc(m.text)+editedTag+'</div>';
      html+='<div class="chat-msg-footer"><span class="chat-msg-time">'+fmtTime(m.time)+'</span>'+checkHtml+'</div>';
      html+='</div></div>';
    }
    container.innerHTML=html;
    container.scrollTop=container.scrollHeight;
  });
}

function markRead(){
  if(!myId||!db)return;
  db.ref("messages").once("value",function(snap){
    var updates={};
    snap.forEach(function(ch){
      var m=ch.val();
      if(m.user!==myId&&!m.read) updates[ch.key+"/read"]=true;
    });
    if(Object.keys(updates).length) db.ref("messages").update(updates);
  });
}

document.addEventListener("visibilitychange",function(){
  if(!document.hidden) document.title="Чат | MM Studio";
});
window.addEventListener("focus",function(){document.title="Чат | MM Studio";});

function onMsgContext(e,msgId,userId){
  e.preventDefault();
  if(userId===myId) startEdit(msgId);
}

function startEdit(msgId){
  db.ref("messages/"+msgId).once("value",function(snap){
    var m=snap.val();if(!m)return;
    editingMsgId=msgId;
    document.getElementById("chatInput").value=m.text||"";
    document.getElementById("editBar").style.display="flex";
    document.getElementById("chatInput").focus();
  });
}

function cancelEdit(){
  editingMsgId=null;
  document.getElementById("chatInput").value="";
  document.getElementById("editBar").style.display="none";
}

function setupInput(){
  var inp=document.getElementById("chatInput");
  var btn=document.getElementById("chatSendBtn");
  inp.addEventListener("input",function(){
    btn.disabled=!this.value.trim()&&!previewData;
    this.style.height="auto";
    this.style.height=Math.min(this.scrollHeight,120)+"px";
  });
  inp.addEventListener("keydown",function(e){
    if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}
    if(e.key==="Escape") cancelEdit();
  });
  btn.addEventListener("click",sendMsg);
  document.getElementById("chatFileInput").addEventListener("change",handleFile);
}

function handleFile(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    previewData=ev.target.result;
    var wrap=document.querySelector(".chat-input-wrap");
    var existing=wrap.querySelector(".chat-preview");if(existing)existing.remove();
    var div=document.createElement("div");
    div.className="chat-preview";
    div.innerHTML='<img src="'+previewData+'"><button class="chat-preview-remove" onclick="removePreview()">&#10005;</button>';
    wrap.insertBefore(div,wrap.firstChild);
    document.getElementById("chatSendBtn").disabled=false;
  };
  reader.readAsDataURL(file);e.target.value="";
}

function removePreview(){
  previewData=null;
  var p=document.querySelector(".chat-preview");if(p)p.remove();
  document.getElementById("chatSendBtn").disabled=!document.getElementById("chatInput").value.trim();
}

function sendMsg(){
  var inp=document.getElementById("chatInput");
  var text=inp.value.trim();
  if(!text&&!previewData)return;
  if(editingMsgId){
    db.ref("messages/"+editingMsgId).update({text:text,edited:true});
    editingMsgId=null;
    document.getElementById("editBar").style.display="none";
  }else{
    var msg={user:myId,name:myName,text:text,time:Date.now(),read:false};
    if(previewData) msg.image=previewData;
    db.ref("messages").push(msg);
  }
  inp.value="";inp.style.height="auto";
  removePreview();
  document.getElementById("chatSendBtn").disabled=true;
}

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function fmtTime(ts){return new Date(ts).toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});}

if(Notification&&Notification.permission==="default"){
  document.addEventListener("click",function(){Notification.requestPermission();},{once:true});
}

if(localStorage.getItem("admin_auth")==="1"){
  var ls=document.getElementById("loginScreen");if(ls)ls.style.display="none";
  var ca=document.getElementById("chatApp");if(ca)ca.style.display="flex";
  myId=(localStorage.getItem("admin_user")||"").toLowerCase();
  myName=NAMES[myId]||localStorage.getItem("admin_user")||"";
  if(myId) initChat();
}

if(window.visualViewport){
  window.visualViewport.addEventListener("resize",function(){
    var c=document.getElementById("chatMessages");
    if(c) setTimeout(function(){c.scrollTop=c.scrollHeight;},100);
  });
}

(function(){var si=document.getElementById("usernameInput");var pi=document.getElementById("passwordInput");if(si)si.addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});if(pi)pi.addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});})();
</script>
</body>
</html>
