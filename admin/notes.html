<div class="main"><div class="main-header"><button class="burger" onclick="toggleSidebar()">&#9776;</button><div class="main-title">Заметки</div></div><div class="main-content"><div class="note-add-bar"><textarea id="noteInput" placeholder="Напишите заметку..." maxlength="2000"></textarea><button onclick="addNote()">Добавить</button></div><div id="notesList"></div></div></div></div>
<script src="data.js"></script>
<script src="app.js?v=2"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
var NOTE_CFG={apiKey:"AIzaSyD3XHJ3xdeJC_ALeIK4nOf1EASO39W3Gh0",authDomain:"mmstudio-86917.firebaseapp.com",databaseURL:"https://mmstudio-86917-default-rtdb.europe-west1.firebasedatabase.app",projectId:"mmstudio-86917",storageBucket:"mmstudio-86917.firebasestorage.app",messagingSenderId:"466384625481",appId:"1:466384625481:web:fb4bb7144d0d329be8c498"};
var noteDb=null;
function getMyId(){return(localStorage.getItem("admin_user")||"").toLowerCase();}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function initNotes(){
  var myId=getMyId();if(!myId)return;
  try{if(!firebase.apps.length)firebase.initializeApp(NOTE_CFG);noteDb=firebase.database();}catch(e){return;}
  noteDb.ref("notes/"+myId).orderByChild("ts").on("value",function(snap){
    var notes=[];
    snap.forEach(function(ch){notes.push({id:ch.key,text:ch.val().text,ts:ch.val().ts});});
    notes.reverse();
    var container=document.getElementById("notesList");
    if(!notes.length){container.innerHTML='<div class="empty-state">Нет заметок</div>';return;}
    var html="";
    for(var i=0;i<notes.length;i++){
      var n=notes[i];
      var dateStr=n.ts?new Date(n.ts).toLocaleString("ru-RU",{day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}):"";
      html+='<div class="note-card"><div class="note-card-actions"><button class="btn-del" onclick="delNote(\''+n.id+'\')" title="Удалить">&#10005;</button></div><div class="note-card-text">'+esc(n.text)+'</div><div class="note-card-time">'+dateStr+'</div></div>';
    }
    container.innerHTML=html;
  });
}
function addNote(){
  var inp=document.getElementById("noteInput");
  var text=inp.value.trim();if(!text||!noteDb)return;
  var myId=getMyId();
  noteDb.ref("notes/"+myId).push({text:text,ts:Date.now()});
  inp.value="";
}
function delNote(id){
  if(!confirm("Удалить заметку?"))return;
  var myId=getMyId();
  if(noteDb)noteDb.ref("notes/"+myId+"/"+id).remove();
}
document.addEventListener("keydown",function(e){
  if(e.key==="Enter"&&e.ctrlKey)addNote();
});
if(localStorage.getItem("admin_auth")==="1")initNotes();
</script>
</body></html>
